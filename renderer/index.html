<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>STL Library Manager</title>
    
</head>
<body>
    <div id="toolbar">
        <button id="scanBtn">Scan Folder</button>
        <button id="deleteBtn">Delete</button>
        <button id="renameBtn">Rename</button>
        <button id="openBtn">Open Folder</button>
    </div>

    <div id="main">
        <div id="sidebar">
            <div id="fileHeader">
                STL Files
            </div>
        </div>
        <div id="viewer">
            STL Preview Area
        </div>
    </div>

    <div id="navigation"></div>
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
    </div>

    <script src="renderer.js"></script>   

</body>
</html>
